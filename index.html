<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main class="card">
      <section class="result">
        <h1>Your Result</h1>
        <p class="final-result"><span class="number">76</span> of 100</p>
        <span class="rating">Great</span>
        <p class="note">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </section>
      <section class="summary">
        <h2>Summary</h2>
        <div class="items">
          <div class="reaction">
            <img src="images/icon-reaction.svg" alt="">
            <span class="left">Reaction</span>
            <span>80 / 100</span>
          </div>
          <div class="memory">
            <img src="images/icon-memory.svg" alt="">
            <span class="left">Memory</span>
            <span>92 / 100</span>
          </div>
          <div class="Verbal">
            <img src="images/icon-verbal.svg" alt="">
            <span class="left">Verbal</span>
            <span>92 / 100</span>
          </div>
          <div class="visual">
            <img src="images/icon-visual.svg" alt="">
            <span class="left">Visual</span>
            <span>72 / 100</span>
          </div>
        </div>
        <span>Continue</span>
      </section>
    </main>
  </body>
</html>
