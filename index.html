<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <main class="card">
      <section class="result">
        <h1>Your Result</h1>
        <p class="final-result"><span class="number">76</span> <span class="out-of">of 100</span></p>
        <span class="rating">Great</span>
        <p class="note">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </section>
      <section class="summary">
        <h2>Summary</h2>
        <div class="items">
          <div class="reaction">
            <div class="left">
              <img src="images/icon-reaction.svg" alt="">
              <span>Reaction</span>
            </div>
            <span class="percent">80 <span>/ 100</span></span>
          </div>
          <div class="memory">
            <div class="left">
              <img src="images/icon-memory.svg" alt="">
              <span>Memory</span>
            </div>
            <span class="percent">92 <span>/ 100</span></span>
          </div>
          <div class="verbal">
            <div class="left">
              <img src="images/icon-verbal.svg" alt="">
              <span>Verbal</span>
            </div>           
            <span class="percent">61 <span>/ 100</span></span>
          </div>
          <div class="visual">
            <div class="left">
              <img src="images/icon-visual.svg" alt="">
              <span>Visual</span>
            </div>
            <span class="percent">73 <span>/ 100</span></span>
          </div>
        </div>
        <button class="button">Continue</button>
      </section>
    </main>
  </body>
</html>
